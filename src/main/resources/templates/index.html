<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark – Đặt vé giữ xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #0d1b2a; }
        .hero { background: linear-gradient(135deg, #0d1b2a 0%, #1b4f8a 100%);
                color: white; padding: 48px 0 32px; text-align: center; margin-bottom: 32px; }
        .hero h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        .hero p  { opacity: 0.75; font-size: 1rem; }
        .card    { border: none; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
        .card-header { background: #0d1b2a; color: white; border-radius: 16px 16px 0 0 !important;
                       padding: 16px 24px; font-weight: 600; }
        .btn-primary { background: #1b4f8a; border-color: #1b4f8a; }
        .btn-primary:hover { background: #163f6e; border-color: #163f6e; }
        .form-label { font-weight: 500; font-size: 14px; color: #344563; }
        .form-control, .form-select { border-radius: 8px; border-color: #dfe1e6; }
        .form-control:focus, .form-select:focus { border-color: #1b4f8a; box-shadow: 0 0 0 3px rgba(27,79,138,0.15); }
        .rate-info { background: #e8f0fe; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #344563; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold">🅿️ SmartPark</span>
    <span class="text-white-50" style="font-size:13px">Hệ thống quản lý bãi đỗ xe</span>
</nav>

<div class="hero">
    <h1>Đặt vé giữ xe trực tuyến</h1>
    <p>Đặt chỗ trước, thanh toán tự động qua chuyển khoản</p>
</div>

<div class="container" style="max-width:560px">
    <div class="card mb-4">
        <div class="card-header">📋 Thông tin đặt vé</div>
        <div class="card-body p-4">
            <form th:action="@{/dat-ve}" method="post">

                <div class="mb-3">
                    <label class="form-label">Họ tên khách hàng</label>
                    <input type="text" name="customerName" class="form-control"
                           placeholder="Nguyễn Văn An" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Biển số xe</label>
                    <input type="text" name="licensePlate" class="form-control"
                           placeholder="51A-12345" required style="text-transform:uppercase">
                </div>

                <div class="mb-3">
                    <label class="form-label">Loại xe</label>
                    <select name="vehicleType" class="form-select" id="vehicleType" onchange="updateSlotOptions()">
                        <option value="xe_may">🏍️ Xe máy – 5,000 đ/giờ</option>
                        <option value="o_to">🚗 Ô tô – 20,000 đ/giờ</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ô đỗ mong muốn <span style="color:#888;font-weight:400">(tuỳ chọn)</span></label>
                    <select name="slotPreference" class="form-select" id="slotSelect">
                        <option value="">-- Bất kỳ ô trống nào --</option>
                    </select>
                    <div style="font-size:12px;color:#888;margin-top:4px">Hệ thống sẽ giữ ô này cho bạn</div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">Giờ vào</label>
                        <input type="datetime-local" name="checkIn" class="form-control" required>
                    </div>
                    <div class="col">
                        <label class="form-label">Giờ ra (dự kiến)</label>
                        <input type="datetime-local" name="checkOut" class="form-control" required>
                    </div>
                </div>

                <div class="rate-info mb-4">
                    💡 Phí tính theo giờ thực tế. Tối thiểu 1 giờ.
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-600" style="font-weight:600">
                    Đặt vé & xem mã thanh toán →
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    const pad = n => String(n).padStart(2,'0');
    const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    const now = new Date();
    const later = new Date(now.getTime() + 2*3600*1000);
    document.querySelector('[name=checkIn]').value  = fmt(now);
    document.querySelector('[name=checkOut]').value = fmt(later);

    async function updateSlotOptions() {
        const type = document.getElementById('vehicleType').value;
        const zone = type === 'o_to' ? 'car' : 'motorbike';
        const sel = document.getElementById('slotSelect');
        sel.innerHTML = '<option value="">-- Bất kỳ ô trống nào --</option>';
        try {
            const res = await fetch('/api/slots/zone/' + zone);
            const data = await res.json();
            const slots = data.data || data;
            slots.filter(s => !s.occupied && !s.reserved).forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.id;
                sel.appendChild(opt);
            });
        } catch(e) { console.error(e); }
    }

    updateSlotOptions();
</script>
</body>
</html>
