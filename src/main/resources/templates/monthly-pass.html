<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark – Đăng ký thẻ tháng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #0d1b2a; }
        .hero { background: linear-gradient(135deg, #0d1b2a 0%, #6c3483 100%);
                color: white; padding: 48px 0 32px; text-align: center; margin-bottom: 32px; }
        .hero h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        .hero p  { opacity: 0.75; font-size: 1rem; }
        .card    { border: none; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
        .card-header { background: #0d1b2a; color: white; border-radius: 16px 16px 0 0 !important;
                       padding: 16px 24px; font-weight: 600; }
        .btn-primary { background: #6c3483; border-color: #6c3483; }
        .btn-primary:hover { background: #5b2c6f; border-color: #5b2c6f; }
        .form-label { font-weight: 500; font-size: 14px; color: #344563; }
        .form-control, .form-select { border-radius: 8px; border-color: #dfe1e6; }
        .form-control:focus, .form-select:focus { border-color: #6c3483; box-shadow: 0 0 0 3px rgba(108,52,131,0.15); }
        .price-card { border-radius: 12px; padding: 16px 20px; margin-bottom: 8px; }
        .price-card.moto { background: #e8f8f5; border: 1px solid #a9dfbf; }
        .price-card.car  { background: #eaf2ff; border: 1px solid #a9c4e8; }
        .price-label { font-size: 13px; color: #6b778c; margin-bottom: 4px; }
        .price-value { font-size: 22px; font-weight: 700; color: #1a2332; }
        .price-unit  { font-size: 12px; color: #6b778c; }
        .alert-info-custom { background: #f3e5f5; border: 1px solid #ce93d8; border-radius: 10px;
                             padding: 14px; font-size: 13px; color: #6a1b9a; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3">
    <a class="navbar-brand fw-bold text-decoration-none" href="/">🅿️ SmartPark</a>
    <a href="/booking" class="text-white-50 text-decoration-none" style="font-size:13px">← Đặt vé theo giờ</a>
</nav>

<div class="hero">
    <h1>🎫 Đăng ký thẻ tháng</h1>
    <p>Ra vào tự do cả tháng – tiết kiệm hơn vé theo giờ</p>
</div>

<div class="container" style="max-width:560px">

    <!-- Bảng giá -->
    <div class="row mb-4">
        <div class="col-6">
            <div class="price-card moto">
                <div class="price-label">🏍️ Xe máy</div>
                <div class="price-value">200.000 đ</div>
                <div class="price-unit">/ tháng</div>
            </div>
        </div>
        <div class="col-6">
            <div class="price-card car">
                <div class="price-label">🚗 Ô tô</div>
                <div class="price-value">500.000 đ</div>
                <div class="price-unit">/ tháng</div>
            </div>
        </div>
    </div>

    <!-- Thông báo lỗi -->
    <div th:if="${error}" class="alert alert-danger rounded-3 mb-3" th:text="${error}"></div>

    <!-- Form đăng ký -->
    <div class="card mb-4">
        <div class="card-header">📋 Thông tin đăng ký</div>
        <div class="card-body p-4">
            <form th:action="@{/dang-ky-the-thang}" method="post">

                <div class="mb-3">
                    <label class="form-label">Họ tên chủ xe</label>
                    <input type="text" name="ownerName" class="form-control"
                           placeholder="Nguyễn Văn An" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email <span class="text-muted fw-normal">(tuỳ chọn – nhận thông báo)</span></label>
                    <input type="email" name="email" class="form-control"
                           placeholder="example@gmail.com">
                </div>

                <div class="mb-3">
                    <label class="form-label">Biển số xe</label>
                    <input type="text" name="licensePlate" class="form-control"
                           placeholder="51A-12345" required style="text-transform:uppercase">
                </div>

                <div class="mb-3">
                    <label class="form-label">Loại xe</label>
                    <select name="vehicleType" class="form-select" id="vehicleType" onchange="updatePrice()">
                        <option value="xe_may">🏍️ Xe máy – 200.000 đ/tháng</option>
                        <option value="o_to">🚗 Ô tô – 500.000 đ/tháng</option>
                    </select>
                </div>

                <div class="row mb-3">
                    <div class="col-7">
                        <label class="form-label">Ngày bắt đầu</label>
                        <input type="date" name="startDate" id="startDate" class="form-control" required>
                    </div>
                    <div class="col-5">
                        <label class="form-label">Số tháng</label>
                        <select name="months" class="form-select" id="months" onchange="updatePrice()">
                            <option value="1">1 tháng</option>
                            <option value="2">2 tháng</option>
                            <option value="3">3 tháng</option>
                            <option value="6">6 tháng</option>
                            <option value="12">12 tháng</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ghi chú <span class="text-muted fw-normal">(tuỳ chọn)</span></label>
                    <input type="text" name="note" class="form-control" placeholder="Ví dụ: xe màu đỏ, tầng B1...">
                </div>

                <div class="alert-info-custom mb-4">
                    💰 Tổng tiền: <strong id="total-price">200.000 đ</strong>
                    &nbsp;·&nbsp; Hiệu lực đến: <strong id="end-date">—</strong>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2" style="font-weight:600">
                    Đăng ký & xem mã thanh toán →
                </button>
            </form>
        </div>
    </div>

    <div class="text-center mb-4">
        <a href="/booking" class="text-muted text-decoration-none" style="font-size:13px">
            Muốn đặt vé theo giờ? Click vào đây
        </a>
    </div>
</div>

<script>
    // Set ngày bắt đầu mặc định là hôm nay
    const today = new Date();
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('startDate').value =
        `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

    function updatePrice() {
        const type   = document.getElementById('vehicleType').value;
        const months = parseInt(document.getElementById('months').value);
        const price  = type === 'o_to' ? 500000 : 200000;
        const total  = price * months;

        document.getElementById('total-price').textContent =
            total.toLocaleString('vi') + ' đ';

        // Tính ngày kết thúc
        const start = new Date(document.getElementById('startDate').value);
        if (!isNaN(start)) {
            const end = new Date(start);
            end.setMonth(end.getMonth() + months);
            end.setDate(end.getDate() - 1);
            document.getElementById('end-date').textContent =
                end.toLocaleDateString('vi', { day:'2-digit', month:'2-digit', year:'numeric' });
        }
    }

    document.getElementById('startDate').addEventListener('change', updatePrice);
    updatePrice();
</script>
</body>
</html>
