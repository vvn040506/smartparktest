<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - SmartPark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; min-height: 100vh; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #1a73e8; border: none; padding: 12px; border-radius: 8px; font-weight: 600; }
        .btn-primary:hover { background-color: #1557b0; }
        .form-control { padding: 12px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-primary">🅿️ SmartPark</h2>
                        <h4 class="text-secondary">Đặt lại mật khẩu</h4>
                    </div>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form method="post" action="/reset-password">
                        <div class="mb-3">
                            <label class="form-label">Email của bạn</label>
                            <input type="email" name="email" class="form-control" th:value="${email}" placeholder="Nhập email đã đăng ký" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mã OTP</label>
                            <input type="text" name="otpCode" class="form-control text-center fw-bold" placeholder="6 chữ số" required maxlength="6" pattern="\d{6}">
                            <div class="form-text">Mã OTP đã được gửi đến email của bạn.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu mới</label>
                            <input type="password" name="newPassword" class="form-control" placeholder="Tối thiểu 6 ký tự" required minlength="6">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Xác nhận mật khẩu mới</label>
                            <input type="password" name="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu mới" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Xác nhận thay đổi</button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="/login" class="text-decoration-none">Quay lại đăng nhập</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
