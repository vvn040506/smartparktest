<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt Mật Khẩu – SmartPark</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f4f8;--surface:#ffffff;--border:#c5d5ea;--accent:#6c5ce7;--green:#00897b;--red:#e53935;--text:#1a2332;--muted:#5f7a99;--font:'Syne',sans-serif;--mono:'Space Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.container{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:420px;max-width:100%;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:56px;height:56px;background:var(--accent);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px}
.logo-text{font-size:24px;font-weight:800}.logo-text span{color:var(--accent)}
.title{font-size:20px;font-weight:800;margin-bottom:8px;text-align:center}
.subtitle{font-size:14px;color:var(--muted);margin-bottom:28px;text-align:center}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-family:var(--mono);margin-bottom:8px}
.field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:var(--font);font-size:15px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}
.btn-submit{width:100%;background:var(--accent);color:white;border:none;border-radius:12px;padding:14px;font-family:var(--font);font-weight:700;font-size:15px;cursor:pointer;transition:opacity .2s;margin-top:8px}
.btn-submit:hover{opacity:.85}
.error{background:rgba(255,61,90,.12);border:1px solid rgba(255,61,90,.3);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--red);text-align:center}
.success{background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.3);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--green);text-align:center}
.password-strength{margin-top:8px;font-size:12px;color:var(--muted);font-family:var(--mono)}
.strength-bar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.strength-fill{height:100%;background:var(--red);transition:width .3s,background .3s;width:0}
.strength-fill.weak{background:var(--red);width:33%}
.strength-fill.medium{background:#f9a825;width:66%}
.strength-fill.strong{background:var(--green);width:100%}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <div class="logo-text">Smart<span>Park</span></div>
  </div>
  
  <div class="title">Đặt Mật Khẩu</div>
  <div class="subtitle">Tạo mật khẩu mới cho tài khoản của bạn</div>
  
  <div th:if="${error}" class="error" th:text="${error}"></div>
  <div th:if="${success}" class="success" th:text="${success}"></div>
  
  <form th:action="@{/set-password}" method="post" onsubmit="return validateForm()">
    <input type="hidden" name="token" th:value="${token}">
    
    <div class="field">
      <label>Mật khẩu mới</label>
      <input type="password" name="password" id="password" placeholder="••••••••" required minlength="6" oninput="checkStrength()">
      <div class="password-strength">
        <span id="strength-text">Độ mạnh: <span id="strength-label">—</span></span>
        <div class="strength-bar">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
      </div>
    </div>
    
    <div class="field">
      <label>Xác nhận mật khẩu</label>
      <input type="password" name="confirmPassword" id="confirmPassword" placeholder="••••••••" required minlength="6">
    </div>
    
    <button type="submit" class="btn-submit">✓ Đặt mật khẩu và kích hoạt</button>
  </form>
</div>

<script>
function checkStrength() {
  const pwd = document.getElementById('password').value;
  const fill = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  
  if (pwd.length === 0) {
    fill.className = 'strength-fill';
    label.textContent = '—';
    return;
  }
  
  let strength = 0;
  if (pwd.length >= 6) strength++;
  if (pwd.length >= 10) strength++;
  if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) strength++;
  if (/\d/.test(pwd)) strength++;
  if (/[^a-zA-Z0-9]/.test(pwd)) strength++;
  
  if (strength <= 2) {
    fill.className = 'strength-fill weak';
    label.textContent = 'Yếu';
  } else if (strength <= 3) {
    fill.className = 'strength-fill medium';
    label.textContent = 'Trung bình';
  } else {
    fill.className = 'strength-fill strong';
    label.textContent = 'Mạnh';
  }
}

function validateForm() {
  const pwd = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;
  
  if (pwd.length < 6) {
    alert('Mật khẩu phải có ít nhất 6 ký tự');
    return false;
  }
  
  if (pwd !== confirm) {
    alert('Mật khẩu xác nhận không khớp');
    return false;
  }
  
  return true;
}
</script>
</body>
</html>
