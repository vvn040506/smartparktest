<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quét QR – SmartPark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
    --bg:#f4f6fb;--surface:#ffffff;--surface2:#f1f5f9;
    --border:#e2e8f0;--primary:#6366f1;--primary-dark:#4338ca;
    --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--orange:#f97316;
    --text:#1e293b;--text-strong:#0f172a;--muted:#64748b;--muted2:#94a3b8;
    --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--sidebar:272px;
}
* { box-sizing: border-box; }
body { line-height: 1.6; }
button, .btn, .btn-submit, .btn-login-submit, .btn-confirm, .btn-action,
.btn-add, .btn-search, .btn-logout, .btn-outline, .nav-item, .zone-pill,
.btn-primary, .btn-success, .btn-outline-white, .btn-white {
    line-height: 1.5;
    overflow: visible;
}
.badge, .version-tag, .admin-badge, .user-role, .status-badge,
.sc-label, .qs-label, .form-label, label {
    line-height: 1.5;
    overflow: visible;
}
.nav-item, .nav-link { line-height: 1.5; overflow: visible; }
.stat-card, .qs-card, .card, .modal { overflow: visible; }

h1,h2,h3,h4,h5,h6,.topbar-title,.login-title,.modal-title,.card-title,.brand-name,.logo-text,
.page-title,.stat-card .sc-value,.section-title {
    font-feature-settings: "ss01" 0, "ss02" 0, "ss03" 0, "calt" 0;
    font-variant-ligatures: none;
    font-variant-numeric: normal;
}

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding: 24px; }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 800; color: var(--text); text-decoration: none; }
        .logo-icon { width: 36px; height: 36px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .logo span { color: var(--primary); }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.04); margin-bottom: 24px; overflow: hidden; }
        .card-title { font-size: 20px; font-weight: 800; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }

        #qr-reader { border-radius: 20px; overflow: hidden; border: 2px solid var(--border) !important; }
        #qr-reader__dashboard { padding: 20px !important; }
        #qr-reader__status_span { font-family: var(--mono); font-size: 12px; }

        .manual-entry { margin-top: 32px; padding-top: 32px; border-top: 1px dashed var(--border); }
        label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 12px; font-family: var(--mono); }
        
        .input-group { display: flex; gap: 12px; }
        input { flex: 1; padding: 14px 20px; border-radius: 16px; border: 1.5px solid var(--border); font-family: var(--font); font-size: 15px; font-weight: 600; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .btn { padding: 14px 24px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; transition: all 0.3s; font-family: var(--font); font-size: 15px; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        
        .btn-success { background: var(--green); color: white; width: 100%; margin-top: 20px; font-size: 18px; padding: 18px; }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--muted); width: 100%; margin-top: 12px; }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

        .result-box { border-radius: 24px; padding: 24px; margin-top: 24px; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .result-success { background: rgba(16, 185, 129, 0.05); border: 2px solid var(--green); }
        .result-error { background: rgba(239, 68, 68, 0.05); border: 2px solid var(--red); }
        .result-info { background: rgba(99, 102, 241, 0.05); border: 2px solid var(--primary); }

        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--muted); font-weight: 600; font-size: 14px; }
        .info-value { font-weight: 700; color: var(--text); }
        .info-value.highlight { color: var(--primary); font-family: var(--mono); font-size: 18px; }

        .status-badge { padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .status-success { background: var(--green); color: white; }

        .back-btn { color: var(--muted); text-decoration: none; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="/staff/dashboard" class="logo">
            <div class="logo-icon">🅿️</div>
            Smart<span>Park</span>
        </a>
        <a href="/staff/dashboard" class="back-btn">← Dashboard</a>
    </div>

    <div class="card">
        <div class="card-title">
            <span>📷</span> Quét QR Code
        </div>
        
        <!-- Camera Scanner -->
        <div id="qr-reader"></div>
        
        <!-- Manual Entry -->
        <div class="manual-entry">
            <label>Nhập mã thủ công</label>
            <div class="input-group">
                <input type="text" id="manual-code" placeholder="SP123456 hoặc MP123456">
                <button class="btn btn-primary" onclick="verifyManualCode()">Kiểm tra</button>
            </div>
        </div>
    </div>

    <!-- Result Container -->
    <div id="result-container"></div>
</div>

<!-- HTML5 QR Code Scanner -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let html5QrCode;
let isScanning = false;

async function startScanner() {
    if (html5QrCode) {
        try { await html5QrCode.stop(); } catch (e) {}
    }
    
    html5QrCode = new Html5Qrcode("qr-reader");
    
    const qrboxFunction = function(viewfinderWidth, viewfinderHeight) {
        let minEdgePercentage = 0.7;
        let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
        let qrboxSize = Math.floor(minEdgeSize * minEdgePercentage);
        return { width: qrboxSize, height: qrboxSize };
    }

    const config = {
        fps: 20,
        qrbox: qrboxFunction,
        aspectRatio: 1.0,
        showTorchButtonIfSupported: true
    };

    try {
        await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, onScanError);
    } catch (err) {
        try {
            await html5QrCode.start({ facingMode: "user" }, config, onScanSuccess, onScanError);
        } catch (err2) {
            showResult('error', 'Không thể truy cập camera. Vui lòng đảm bảo bạn đang dùng HTTPS và đã cấp quyền.');
        }
    }
}

function onScanSuccess(decodedText, decodedResult) {
    if (isScanning) return;
    isScanning = true;
    html5QrCode.pause();
    verifyQR(decodedText);
}

function onScanError(errorMessage) {}

async function verifyQR(qrData) {
    try {
        showResult('info', '🔄 Đang kiểm tra dữ liệu...');
        
        const response = await fetch('/api/qr/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ qrData: qrData })
        });
        
        const result = await response.json();
        
        if (result.success && result.data) {
            showSuccessResult(result.data);
        } else {
            showResult('error', '❌ ' + (result.message || 'QR không hợp lệ'));
            setTimeout(() => {
                html5QrCode.resume();
                isScanning = false;
            }, 3000);
        }
    } catch (error) {
        showResult('error', '❌ Lỗi kết nối máy chủ');
        setTimeout(() => {
            html5QrCode.resume();
            isScanning = false;
        }, 3000);
    }
}

function showSuccessResult(data) {
    const type = data.type === 'booking' ? 'Vé đặt trước' : 'Thẻ tháng';
    const icon = data.type === 'booking' ? '🎫' : '🎟️';
    
    let html = `
        <div class="result-box result-success">
            <div style="font-size:40px;text-align:center;margin-bottom:16px">✅</div>
            <h3 style="text-align:center;margin-bottom:24px;font-weight:800">${icon} ${type} hợp lệ</h3>
            
            <div class="info-row">
                <span class="info-label">Mã định danh:</span>
                <span class="info-value highlight">${data.code}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Biển số xe:</span>
                <span class="info-value" style="font-size:20px">${data.licensePlate}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Trạng thái:</span>
                <span class="status-badge status-success">${data.status}</span>
            </div>
            
            <!-- Khung hiển thị giá tiền để bảo vệ thu tiền -->
            <div id="priceTag" style="margin-top: 20px; padding: 15px; background: #f0fdf4; border: 2px solid #16a34a; border-radius: 16px; display: none;">
                <div style="font-size: 12px; color: #16a34a; font-weight: 700; text-transform: uppercase; margin-bottom: 4px;">Số tiền cần thu:</div>
                <div id="ticketPrice" style="font-size: 28px; color: #15803d; font-weight: 800; font-family: var(--mono);">0 đ</div>
            </div>
    `;
    
    if (data.details) {
        if (data.type === 'booking') {
            html += `
                <div class="info-row">
                    <span class="info-label">Khách hàng:</span>
                    <span class="info-value">${data.details.customerName || '-'}</span>
                </div>
            <div class="info-row">
                <span class="info-label">Trạng thái:</span>
                <span class="status-badge status-success">${data.status}</span>
            </div>
            
            <!-- Khung hiển thị giá tiền để bảo vệ thu tiền (Chỉ hiện cho vé đặt trực tiếp) -->
            <div id="priceTag" style="margin-top: 20px; padding: 15px; background: #f0fdf4; border: 2px solid #16a34a; border-radius: 16px; display: none;">
                <div style="font-size: 12px; color: #16a34a; font-weight: 700; text-transform: uppercase; margin-bottom: 4px;">Số tiền cần thu:</div>
                <div id="ticketPrice" style="font-size: 28px; color: #15803d; font-weight: 800; font-family: var(--mono);">0 đ</div>
            </div>
    `;
            if (data.details.slotId) {
                html += `
                    <div class="info-row">
                        <span class="info-label">Vị trí đỗ:</span>
                        <span class="info-value highlight">${data.details.slotId}</span>
                    </div>
                `;
            }
        } else if (data.type === 'monthly_pass') {
            html += `
                <div class="info-row">
                    <span class="info-label">Chủ thẻ:</span>
                    <span class="info-value">${data.details.ownerName || '-'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Hết hạn:</span>
                    <span class="info-value">${new Date(data.details.endDate).toLocaleDateString('vi-VN')}</span>
                </div>
            `;
        }
    }
    
    html += `
            <button class="btn btn-success" onclick="confirmEntry()">✓ XÁC NHẬN CHO VÀO</button>
            <button class="btn btn-outline" onclick="resetScanner()">Quét mã khác</button>
        </div>
    `;
    
    document.getElementById('result-container').innerHTML = html;

    // Hiển thị giá tiền nếu là vé đặt trực tiếp (walk-in)
    if (data.type === 'booking' && data.details && data.details.bookingType === 'walk_in') {
        const priceTag = document.getElementById('priceTag');
        const ticketPrice = document.getElementById('ticketPrice');
        if (priceTag && ticketPrice && data.details.amountDue > 0) {
            ticketPrice.textContent = data.details.amountDue.toLocaleString('vi-VN') + ' đ';
            priceTag.style.display = 'block';
        }
    }
}

function showResult(type, message) {
    const className = type === 'success' ? 'result-success' : 
                     type === 'error' ? 'result-error' : 'result-info';
    
    const html = `
        <div class="result-box ${className}">
            <p style="text-align:center;font-weight:700;margin:0">${message}</p>
        </div>
    `;
    
    document.getElementById('result-container').innerHTML = html;
}

function confirmEntry() {
    showResult('success', '✅ Đã xác nhận! Xe được phép vào bãi.');
    setTimeout(resetScanner, 2000);
}

function resetScanner() {
    document.getElementById('result-container').innerHTML = '';
    document.getElementById('manual-code').value = '';
    isScanning = false;
    if (html5QrCode) {
        html5QrCode.resume();
    }
}

async function verifyManualCode() {
    const code = document.getElementById('manual-code').value.trim();
    if (!code) {
        showResult('error', 'Vui lòng nhập mã');
        return;
    }
    
    showResult('info', '🔄 Đang kiểm tra mã ' + code + '...');
    
    try {
        const response = await fetch('/api/qr/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ qrData: code, isManual: true })
        });
        
        const result = await response.json();
    if (result.success && result.data) {
        showSuccessResult(result.data);
        
        // Hiển thị giá tiền nếu là vé đặt trước (pre-booking)
        if (result.data.type === 'booking' && result.data.details && result.data.details.amountDue > 0) {
            document.getElementById('ticketPrice').textContent = result.data.details.amountDue.toLocaleString('vi-VN') + ' đ';
            document.getElementById('priceTag').style.display = 'block';
        }
    } else {
            showResult('error', '❌ ' + (result.message || 'Mã không hợp lệ'));
        }
    } catch (error) {
        showResult('error', '❌ Lỗi kết nối máy chủ');
    }
}

window.onload = startScanner;
</script>

</body>
</html>
