<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận tài khoản - SmartPark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input[type="email"],
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="email"]:focus,
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .otp-input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 8px;
            font-weight: bold;
        }
        .password-hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔒 Xác nhận tài khoản</h2>
        <p class="subtitle">Nhập email, mã OTP và đặt mật khẩu mới</p>
        
        <p th:if="${error}" th:text="${error}" class="error"></p>
        
        <form method="post" action="/verify-account-otp">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" 
                       th:value="${email}"
                       placeholder="Nhập email của bạn" required/>
                <p class="password-hint">Email bạn nhận được OTP</p>
            </div>
            
            <div class="form-group">
                <label for="otpCode">Mã OTP (6 chữ số)</label>
                <input type="text" id="otpCode" name="otpCode" 
                       class="otp-input"
                       placeholder="000000" 
                       required 
                       maxlength="6" 
                       pattern="[0-9]{6}"
                       inputmode="numeric"/>
                <p class="password-hint">Kiểm tra email để lấy mã OTP</p>
            </div>
            
            <div class="form-group">
                <label for="password">Mật khẩu mới</label>
                <input type="password" id="password" name="password" 
                       placeholder="Nhập mật khẩu mới" required minlength="6"/>
                <p class="password-hint">Tối thiểu 6 ký tự</p>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" name="confirmPassword" 
                       placeholder="Nhập lại mật khẩu mới" required minlength="6"/>
            </div>
            
            <button type="submit">Xác nhận và kích hoạt tài khoản</button>
        </form>
        
        <div class="back-link">
            <a href="/login">← Quay lại đăng nhập</a>
        </div>
    </div>
</body>
</html>
