<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận OTP – SmartPark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#f4f6fb;--surface:#fff;--border:#e2e8f0;--primary:#6366f1;--primary-dark:#4338ca;
            --text:#1e293b;--text-strong:#0f172a;--muted:#64748b;--red:#ef4444;--green:#10b981;
            --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
        }
* { box-sizing: border-box; }
body { line-height: 1.6; }
button, .btn, .btn-submit, .btn-login-submit, .btn-confirm, .btn-action,
.btn-add, .btn-search, .btn-logout, .btn-outline, .nav-item, .zone-pill,
.btn-primary, .btn-success, .btn-outline-white, .btn-white {
    line-height: 1.5;
    overflow: visible;
}
.badge, .version-tag, .admin-badge, .user-role, .status-badge,
.sc-label, .qs-label, .form-label, label {
    line-height: 1.5;
    overflow: visible;
}
.nav-item, .nav-link { line-height: 1.5; overflow: visible; }
.stat-card, .qs-card, .card, .modal { overflow: visible; }

h1,h2,h3,h4,h5,h6,.topbar-title,.login-title,.modal-title,.card-title,.brand-name,.logo-text,
.page-title,.stat-card .sc-value,.section-title {
    font-feature-settings: "ss01" 0, "ss02" 0, "ss03" 0, "calt" 0;
    font-variant-ligatures: none;
    font-variant-numeric: normal;
}

        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:44px;width:100%;max-width:420px;box-shadow:0 12px 40px rgba(0,0,0,0.06)}
        .logo{display:flex;align-items:center;gap:11px;font-size:22px;font-weight:800;color:var(--text-strong);text-decoration:none;margin-bottom:36px;justify-content:center}
        .logo-icon{width:40px;height:40px;background:var(--primary);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;color:white;flex-shrink:0}
        .logo span{color:var(--primary)}
        h2{font-size:26px;font-weight:700;letter-spacing: -0.1px;margin-bottom:10px;text-align:center;color:var(--text-strong)}
        .subtitle{color:var(--muted);text-align:center;margin-bottom:28px;font-size:14.5px;font-weight:500;line-height:1.6}
        .alert{padding:14px 18px;border-radius:12px;font-size:13.5px;font-weight:600;margin-bottom:22px;text-align:center}
        .alert-success{background:rgba(16,185,129,0.08);color:var(--green);border:1px solid rgba(16,185,129,0.2)}
        .alert-error{background:rgba(239,68,68,0.08);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
        .form-group{margin-bottom:20px}
        label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing: 0.8px;color:var(--muted);margin-bottom:9px;font-family:var(--mono)}
        input[type="email"]{width:100%;padding:14px 18px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2,#f1f5f9);font-family:var(--font);font-size:15px;font-weight:600;color:var(--muted);cursor:not-allowed;outline:none}
        .otp-input{width:100%;padding:16px 18px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);font-family:var(--mono);font-size:28px;font-weight:800;text-align:center;letter-spacing:8px;transition:border-color 0.2s,box-shadow 0.2s;color:var(--primary);outline:none}
        .otp-input:focus{border-color:var(--primary);background:white;box-shadow:0 0 0 4px rgba(99,102,241,0.1)}
        .hint{font-size:11.5px;color:var(--muted);margin-top:7px;text-align:center;font-weight:500}
        .btn-submit{width:100%;padding: 16px 18px 18px;border-radius:12px;border:none;background:var(--primary);color:white;font-size:15px;font-weight:800;cursor:pointer;transition:background 0.2s,transform 0.2s,box-shadow 0.2s;box-shadow:0 8px 22px rgba(99,102,241,0.25);margin-bottom:20px;margin-top:4px}
        .btn-submit:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:0 12px 28px rgba(99,102,241,0.32)}
        .back-link{display:block;text-align:center;color:var(--muted);text-decoration:none;font-size:13.5px;font-weight:700;transition:color 0.2s}
        .back-link:hover{color:var(--primary)}
    </style>
</head>
<body>
<div class="card">
    <a href="/" class="logo">
        <div class="logo-icon">🅿️</div>
        Smart<span>Park</span>
    </a>
    <h2>Xác nhận OTP</h2>
    <p class="subtitle">Vui lòng nhập mã 6 chữ số đã được gửi đến email của bạn.</p>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <form method="post" action="/verify-user-otp">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" th:value="${email}" readonly/>
        </div>
        <div class="form-group">
            <label>Mã OTP (6 chữ số)</label>
            <input type="text" name="otpCode" class="otp-input" placeholder="000000" required maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autofocus/>
            <p class="hint">Mã có hiệu lực trong 10 phút. Kiểm tra cả hộp thư rác.</p>
        </div>
        <button type="submit" class="btn-submit">Xác nhận tài khoản</button>
    </form>
    <a href="/login" class="back-link">← Quay lại đăng nhập</a>
</div>
</body>
</html>
